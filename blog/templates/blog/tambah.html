<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulis Artikel Baru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5" style="max-width: 800px;">
        <div class="card shadow-sm border-0 p-5">
            <h2 class="fw-bold text-primary mb-4">Tulis Artikel Baru</h2>

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="mt-4">
                    <button type="submit" class="btn btn-success px-4">Terbitkan Artikel</button>
                    <a href="{% url 'halaman_utama' %}" class="btn btn-outline-secondary ms-2">Batal</a>
                </div>

            </form>
        </div>
    </div>

</body>

</html>
