<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Hapus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow border-0 p-4 text-center" style="max-width: 500px;">
        <h2 class="text-danger mb-3">⚠️ Peringatan!</h2>
        <p class="fs-5">Apakah kamu yakin ingin menghapus artikel berjudul:</p>
        <p class="fw-bold fs-4 text-dark">"{{ artikel.judul }}"?</p>
        <p class="text-muted small">Tindakan ini tidak dapat dibatalkan.</p>

        <form method="POST" class="mt-4">
            {% csrf_token %}
            <a href="{% url 'detail_artikel' artikel.id %}" class="btn btn-secondary px-4 me-2">Batal</a>
            <button type="submit" class="btn btn-danger px-4">Ya, Hapus Permanen</button>
        </form>
    </div>

</body>

</html>
