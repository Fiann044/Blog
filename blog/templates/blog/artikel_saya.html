<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel Saya - Blog Gawul</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-info">📚 Artikel Milik {{ user.username }}</h2>
            <a href="{% url 'halaman_utama' %}" class="btn btn-outline-secondary">&larr; Kembali ke Beranda</a>
        </div>
        <hr>

        <div class="row">
            {% for artikel in daftar_artikel %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0">
                    {% if artikel.gambar %}
                    <img src="{{ artikel.gambar.url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ artikel.judul }}</h5>
                        <p class="text-muted small">📅 {{ artikel.tanggal_publikasi|date:"d M Y" }}</p>

                        <div class="mt-3">
                            <a href="{% url 'detail_artikel' artikel.id %}" class="btn btn-primary btn-sm">Lihat</a>
                            <a href="{% url 'hapus_artikel' artikel.id %}" class="btn btn-danger btn-sm">Hapus</a>
                        </div>
                    </div>
                </div>
            </div>

            {% empty %}
            <div class="col-12 text-center mt-5">
                <h5 class="text-muted">Kamu belum menulis artikel apapun. 😢</h5>
                <a href="{% url 'tambah_artikel' %}" class="btn btn-success mt-3">+ Tulis Artikel Pertamamu</a>
            </div>
            {% endfor %}
        </div>
    </div>

</body>

</html>
