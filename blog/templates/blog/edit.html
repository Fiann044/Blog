<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Artikel - Blog Gawul</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 p-4">
                    <h2 class="fw-bold text-warning mb-4">✏️ Edit Artikel</h2>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <div class="mt-4">
                            <button type="submit" class="btn btn-warning fw-bold text-dark me-2">Simpan
                                Perubahan</button>
                            <a href="{% url 'detail_artikel' artikel.id %}" class="btn btn-outline-secondary">Batal</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

</body>

</html>
