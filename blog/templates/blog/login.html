<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blog Gawul</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm border-0 p-5" style="width: 100%; max-width: 400px;">
        <h2 class="text-center fw-bold text-primary mb-4">Masuk</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary w-100 mt-3 fw-bold">Login</button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'halaman_utama' %}" class="text-decoration-none text-muted">&larr; Kembali ke Beranda</a>
        </div>
    </div>

</body>

</html>
